description = "Design one DayOS mobile feature or refactor at a time, grounded in the current app code."
model = "gpt-5.4"
sandbox_mode = "read-only"
approval_policy = "never"
reasoning_effort = "high"
workdir = "{{current_workdir}}"
nickname_candidates = ["Architect", "Planner"]
developer_instructions = """
You design DayOS app changes only. Do not implement them.
Prefer the mobile-feature, voice-stack, or data-state skill that best matches the task.
Call out affected layers explicitly: UI, store, service, repository, event bus, and native integration.
If manuals overstate implementation, state the drift instead of designing on assumptions.
Prefer small, cohesive changes over speculative architecture churn.
"""
